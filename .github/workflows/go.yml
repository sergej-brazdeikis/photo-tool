name: Go

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            nfr07_macos_ci_tier: "125"
            nfr07_macos_fyne_scale: "1.25"
          - os: macos-latest
            nfr07_macos_ci_tier: "150"
            nfr07_macos_fyne_scale: "1.5"
          - os: windows-latest
            nfr07_windows_dpi: 120
          - os: windows-latest
            nfr07_windows_dpi: 144
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Bash syntax — helper scripts
        run: bash -n scripts/bmad-story-workflow.sh scripts/assemble-judge-bundle.sh scripts/ux-judge-loop.sh

      - name: Windows — system DPI for NFR-07 AC3 (LogPixels)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dpi = [int]${{ matrix.nfr07_windows_dpi }}
          Set-ItemProperty -Path 'HKCU:\Control Panel\Desktop' -Name LogPixels -Value $dpi -Type DWord
          Set-ItemProperty -Path 'HKCU:\Control Panel\Desktop' -Name Win8DpiScaling -Value 1 -Type DWord
          rundll32.exe user32.dll,UpdatePerUserSystemParameters

      - name: Test run (macOS — NFR-07 AC3 surrogate + FYNE_SCALE)
        if: runner.os == 'macOS'
        env:
          PHOTO_TOOL_NFR07_MACOS_CI_TIER: ${{ matrix.nfr07_macos_ci_tier }}
          FYNE_SCALE: ${{ matrix.nfr07_macos_fyne_scale }}
        run: go test ./...

      # Optional Phase 8 (plan): ensure Fyne journey capture writes PNGs + steps.json — no LLM / no agent.
      - name: UX journey capture smoke (macOS only, one matrix leg)
        if: runner.os == 'macOS' && matrix.nfr07_macos_ci_tier == '125'
        env:
          PHOTO_TOOL_UX_JOURNEY_TEST: "1"
          PHOTO_TOOL_UX_CAPTURE_DIR: ${{ runner.temp }}/photo-tool-ux-capture
          FYNE_SCALE: ${{ matrix.nfr07_macos_fyne_scale }}
        run: |
          mkdir -p "$PHOTO_TOOL_UX_CAPTURE_DIR"
          go test ./internal/app -run TestUXJourneyCapture -count=1 -v
          test -f "$PHOTO_TOOL_UX_CAPTURE_DIR/steps.json"
          ls "$PHOTO_TOOL_UX_CAPTURE_DIR"/*.png
          echo "UX_CAPTURE_DIR=$PHOTO_TOOL_UX_CAPTURE_DIR" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        if: runner.os == 'macOS' && matrix.nfr07_macos_ci_tier == '125'
        with:
          name: ux-capture-smoke
          path: ${{ env.UX_CAPTURE_DIR }}

      - name: Test run (Windows)
        if: runner.os == 'Windows'
        run: go test ./...
